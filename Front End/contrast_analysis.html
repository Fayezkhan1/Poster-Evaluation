<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Contrast Analysis</title>
    <style>
        :root {
            --primary-color: #4361ee;
            --success-color: #2ec4b6;
            --danger-color: #ef476f;
            --text-primary: #2b2d42;
            --text-secondary: #8d99ae;
            --bg-light: #f8f9fa;
            --card-shadow: 0 10px 20px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f7ff;
            color: var(--text-primary);
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
        }

        h1 {
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary-color), #4895ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            text-decoration: none;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .back-button:hover {
            transform: translateX(-5px);
            background: #4895ef;
        }

        .analysis-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .image-section {
            margin-bottom: 30px;
        }

        .image-section img {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
        }

        .table-container {
            overflow-x: auto;
            background: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 0;
            padding: 0;
            background: white;
        }

        th, td {
            text-align: left;
            padding: 16px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        th {
            background-color: var(--bg-light);
            color: var(--text-primary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 0.05em;
        }

        tr:hover {
            background-color: var(--bg-light);
        }

        .status {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.9em;
            display: inline-block;
        }

        .status.pass {
            background-color: rgba(46, 196, 182, 0.1);
            color: var(--success-color);
        }

        .status.fail {
            background-color: rgba(239, 71, 111, 0.1);
            color: var(--danger-color);
        }

        .summary {
            background: var(--bg-light);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .summary-title {
            font-size: 1.2em;
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            th, td {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="analysis.html" class="back-button">← Back to Analysis</a>
        <h1>Color Contrast Analysis</h1>

        <div class="analysis-content">
            <div class="summary">
                <h2 class="summary-title">Analysis Summary</h2>
                <div class="summary-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalSections">0</div>
                        <div class="stat-label">Total Sections</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="passingSections">0</div>
                        <div class="stat-label">Passing Sections</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="failingSections">0</div>
                        <div class="stat-label">Failing Sections</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="passRate">0%</div>
                        <div class="stat-label">Pass Rate</div>
                    </div>
                </div>
            </div>

            <div class="image-section">
                <img id="contrastImage" alt="Color contrast analysis visualization" />
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Section</th>
                            <th>Contrast Ratio</th>
                            <th>Status</th>
                            <th>Accessibility Level</th>
                        </tr>
                    </thead>
                    <tbody id="contrastTable">
                        <!-- Table content will be populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const analysisDataStr = sessionStorage.getItem('analysisData');
            if (!analysisDataStr) {
                console.error('No analysis data found in sessionStorage');
                return;
            }

            try {
                const analysisData = JSON.parse(analysisDataStr);
                const sections = analysisData.color_contrast.sections;
                
                // Update summary statistics
                const totalSections = sections.length;
                const passingSections = sections.filter(s => s.accessibility !== "Fail").length;
                const failingSections = totalSections - passingSections;
                const passRate = Math.round((passingSections / totalSections) * 100);

                document.getElementById('totalSections').textContent = totalSections;
                document.getElementById('passingSections').textContent = passingSections;
                document.getElementById('failingSections').textContent = failingSections;
                document.getElementById('passRate').textContent = `${passRate}%`;

                // Populate table
                const tableBody = document.getElementById('contrastTable');
                sections.forEach(section => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>Section ${section.section}</td>
                        <td>${section.contrast_ratio.toFixed(2)}</td>
                        <td><span class="status ${section.accessibility !== 'Fail' ? 'pass' : 'fail'}">${section.accessibility !== 'Fail' ? 'Pass' : 'Fail'}</span></td>
                        <td>${section.accessibility === 'Fail' ? 'Not Accessible' : section.accessibility}</td>
                    `;
                    tableBody.appendChild(row);
                });

                // Load contrast image
                const timestamp = new Date().getTime();
                const contrastImg = document.getElementById('contrastImage');
                
                async function loadImage(url, imgElement) {
                    try {
                        const response = await fetch(url);
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const blob = await response.blob();
                        const imageUrl = URL.createObjectURL(blob);
                        imgElement.src = imageUrl;
                    } catch (error) {
                        console.error('Error loading image:', error);
                        imgElement.style.display = 'none';
                        const errorMsg = document.createElement('p');
                        errorMsg.style.color = 'red';
                        errorMsg.textContent = 'Failed to load image';
                        imgElement.parentNode.appendChild(errorMsg);
                    }
                }

                loadImage(`http://localhost:5000/color-contrast?t=${timestamp}`, contrastImg);
            } catch (error) {
                console.error('Error parsing analysis data:', error);
                alert('Error displaying contrast analysis results. Please try again.');
            }
        });
    </script>
</body>
</html>
